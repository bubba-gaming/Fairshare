<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>FairShare – Prototyp C: Chat Flow</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0f1a;--bg2:#1a1a2e;--bg3:#232342;--bg4:#2d2d52;--text:#e8e8f0;--text2:#a0a0c0;--text3:#6a6a90;--accent1:#6c5ce7;--accent1b:#8b7cf0;--accent2:#00cec9;--accent2b:#55efc4;--accent3:#fd79a8;--accent4:#fdcb6e;--success:#51cf66;--card-radius:20px}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* Header */
.chat-header{display:flex;align-items:center;padding:16px 20px;background:var(--bg2);border-bottom:1px solid rgba(255,255,255,.05);flex-shrink:0;z-index:10}
.chat-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--accent1),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:16px;margin-right:12px;flex-shrink:0}
.chat-title{font-size:16px;font-weight:700;flex:1}
.chat-skip{background:none;border:none;color:var(--text3);font-family:inherit;font-size:13px;cursor:pointer;padding:6px 12px}
.chat-skip:hover{color:var(--text2)}

/* Messages area */
.chat-messages{flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:8px;scroll-behavior:smooth}

/* Message bubbles */
.msg-row{display:flex;gap:8px;max-width:88%;animation:msgIn .3s ease-out}
.msg-row.bot{align-self:flex-start}
.msg-row.user{align-self:flex-end;flex-direction:row-reverse}
.msg-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--accent1),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;margin-top:2px}
.msg-bubble{padding:12px 16px;font-size:14px;line-height:1.6;max-width:100%}
.msg-row.bot .msg-bubble{background:var(--bg3);border-radius:16px 16px 16px 4px;color:var(--text)}
.msg-row.user .msg-bubble{background:var(--accent1);border-radius:16px 16px 4px 16px;color:white;font-weight:500}
@keyframes msgIn{from{opacity:0;transform:translateY(10px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}

/* Typing indicator */
.typing-row{display:flex;gap:8px;align-self:flex-start;max-width:88%}
.typing-bubble{background:var(--bg3);border-radius:16px 16px 16px 4px;padding:14px 20px;display:flex;gap:5px;align-items:center}
.typing-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);animation:typePulse .8s ease-in-out infinite}
.typing-dot:nth-child(2){animation-delay:.15s}
.typing-dot:nth-child(3){animation-delay:.3s}
@keyframes typePulse{0%,100%{opacity:.3;transform:translateY(0)}50%{opacity:1;transform:translateY(-3px)}}

/* Action buttons (inline) */
.msg-actions{display:flex;gap:8px;align-self:flex-start;margin-top:4px;animation:msgIn .3s ease-out}
.msg-action-btn{padding:10px 20px;border:none;border-radius:12px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:transform .2s}
.msg-action-btn:active{transform:scale(.95)}
.msg-action-btn.primary{background:var(--accent1);color:white}
.msg-action-btn.secondary{background:var(--bg3);color:var(--text3)}

/* Input area */
.chat-input-area{flex-shrink:0;padding:16px;background:var(--bg2);border-top:1px solid rgba(255,255,255,.05);display:none}
.chat-input-area.show{display:block;animation:slideUp .3s ease-out}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.ci-group{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.ci-group:last-child{margin-bottom:0}
.ci-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ci-input{flex:1;padding:12px 14px;background:var(--bg3);border:2px solid transparent;border-radius:12px;color:var(--text);font-family:inherit;font-size:15px;font-weight:600;outline:none;transition:all .3s}
.ci-input::placeholder{color:var(--text3);font-weight:400}
.ci-input:focus{border-color:var(--accent1);box-shadow:0 0 0 3px rgba(108,92,231,.15)}
.ci-suffix{color:var(--text3);font-size:13px;font-weight:600;flex-shrink:0}
.ci-net{font-size:11px;color:var(--success);font-weight:600;margin-left:20px;margin-top:2px}
.ci-send{width:44px;height:44px;border-radius:50%;background:var(--accent1);border:none;color:white;font-size:18px;cursor:pointer;transition:transform .2s,opacity .2s;flex-shrink:0}
.ci-send:disabled{opacity:.3;cursor:not-allowed}
.ci-send:not(:disabled):active{transform:scale(.9)}
.ci-row{display:flex;align-items:center;gap:8px;margin-top:12px}

/* Rich cards in chat */
.rich-card{background:var(--bg2);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:16px;margin:4px 0;max-width:300px;animation:msgIn .3s ease-out}
.rich-card.wide{max-width:100%;align-self:flex-start;margin-left:36px}
.rc-ratio-badges{display:flex;justify-content:center;gap:10px;margin-bottom:10px}
.rc-ratio-badge{padding:6px 14px;border-radius:20px;font-size:15px;font-weight:800;text-align:center;opacity:0;transform:scale(.8);transition:all .4s cubic-bezier(.34,1.56,.64,1)}
.rc-ratio-badge.show{opacity:1;transform:scale(1)}
.rc-ratio-badge.p1{background:rgba(108,92,231,.2);color:var(--accent1b);border:1px solid rgba(108,92,231,.3)}
.rc-ratio-badge.p2{background:rgba(0,206,201,.2);color:var(--accent2);border:1px solid rgba(0,206,201,.3)}
.rc-ratio-bar{height:10px;border-radius:5px;background:var(--bg4);overflow:hidden;display:flex;margin:8px 0}
.rc-fill1{background:linear-gradient(90deg,var(--accent1),var(--accent1b));width:50%;transition:width .8s cubic-bezier(.34,1.56,.64,1)}
.rc-fill2{background:linear-gradient(90deg,var(--accent2),var(--accent2b));width:50%;transition:width .8s cubic-bezier(.34,1.56,.64,1)}
.rc-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--text3)}
.rc-step{display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg3);border-radius:10px;margin-bottom:6px;font-size:13px;font-weight:600;opacity:0;transform:translateY(8px);transition:all .3s}
.rc-step.show{opacity:1;transform:translateY(0)}
.rc-step .icon{font-size:18px}

/* Summary card */
.rc-sum-row{display:flex;justify-content:space-between;padding:5px 0;font-size:13px}
.rc-sum-row .l{color:var(--text2);display:flex;align-items:center;gap:6px}
.rc-sum-row .l .dot{width:6px;height:6px;border-radius:50%}
.rc-sum-row .v{font-weight:700}
.rc-sum-div{height:1px;background:rgba(255,255,255,.06);margin:6px 0}

/* Final CTA */
.chat-cta{padding:16px;flex-shrink:0;display:none}
.chat-cta.show{display:block;animation:slideUp .3s ease-out}
.chat-cta-btn{width:100%;padding:16px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--accent1),#8b5cf6);color:white;font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;transition:transform .2s}
.chat-cta-btn:active{transform:scale(.97)}
</style>
</head>
<body>

<div class="chat-header">
  <div class="chat-avatar">⚖️</div>
  <div class="chat-title">FairShare</div>
  <button class="chat-skip" onclick="finish()">Hoppa över</button>
</div>

<div class="chat-messages" id="msgs"></div>
<div class="chat-input-area" id="inputArea"></div>
<div class="chat-cta" id="ctaArea"></div>

<script>
var D={name1:'',name2:'',gross1:0,gross2:0,net1:0,net2:0,r1:50,r2:50};
var msgs=document.getElementById('msgs');
var inputArea=document.getElementById('inputArea');
var ctaArea=document.getElementById('ctaArea');
var queue=[];
var running=false;

function calcNet(g){if(g<=0)return 0;var t=g*.32;if(g*12>615700)t+=(g-615700/12)*.20;return Math.round(g-t+g*.12)}
function fmt(n){return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g,' ')}

function scrollBottom(){
  setTimeout(function(){msgs.scrollTop=msgs.scrollHeight},50);
}

// Queue system for sequential messages
function enqueue(fn){queue.push(fn);if(!running)runNext()}
function runNext(){if(!queue.length){running=false;return}running=true;queue.shift()()}

function addTyping(cb){
  var row=document.createElement('div');
  row.className='typing-row';
  row.innerHTML='<div class="msg-avatar">⚖️</div><div class="typing-bubble"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
  msgs.appendChild(row);
  scrollBottom();
  setTimeout(function(){msgs.removeChild(row);cb()},700);
}

function addBotMsg(text,delay){
  enqueue(function(){
    addTyping(function(){
      var row=document.createElement('div');
      row.className='msg-row bot';
      row.innerHTML='<div class="msg-avatar">⚖️</div><div class="msg-bubble">'+text+'</div>';
      msgs.appendChild(row);
      scrollBottom();
      setTimeout(runNext,delay||300);
    });
  });
}

function addUserMsg(text){
  var row=document.createElement('div');
  row.className='msg-row user';
  row.innerHTML='<div class="msg-bubble">'+text+'</div>';
  msgs.appendChild(row);
  scrollBottom();
}

function addActions(buttons){
  enqueue(function(){
    var div=document.createElement('div');
    div.className='msg-actions';
    buttons.forEach(function(b){
      var btn=document.createElement('button');
      btn.className='msg-action-btn '+(b.primary?'primary':'secondary');
      btn.textContent=b.label;
      btn.onclick=function(){
        div.remove();
        b.action();
      };
      div.appendChild(btn);
    });
    msgs.appendChild(div);
    scrollBottom();
    running=false;
  });
}

function addRichCard(html,cls){
  enqueue(function(){
    var div=document.createElement('div');
    div.className='rich-card'+(cls?' '+cls:'');
    div.innerHTML=html;
    msgs.appendChild(div);
    scrollBottom();
    setTimeout(runNext,200);
  });
}

function showNameInput(){
  enqueue(function(){
    inputArea.innerHTML='<div class="ci-group"><div class="ci-dot" style="background:var(--accent1)"></div><input class="ci-input" type="text" id="ciN1" placeholder="Ditt namn" oninput="checkNameInput()"></div><div class="ci-group"><div class="ci-dot" style="background:var(--accent2)"></div><input class="ci-input" type="text" id="ciN2" placeholder="Partnerns namn" oninput="checkNameInput()"></div><div class="ci-row"><div style="flex:1"></div><button class="ci-send" id="ciSendName" disabled onclick="submitNames()">→</button></div>';
    inputArea.classList.add('show');
    scrollBottom();
    running=false;
  });
}

function checkNameInput(){
  var n1=document.getElementById('ciN1').value.trim();
  var n2=document.getElementById('ciN2').value.trim();
  document.getElementById('ciSendName').disabled=!(n1&&n2);
}

function submitNames(){
  D.name1=document.getElementById('ciN1').value.trim();
  D.name2=document.getElementById('ciN2').value.trim();
  inputArea.classList.remove('show');inputArea.innerHTML='';
  addUserMsg(D.name1+' & '+D.name2);
  setTimeout(function(){startSalaryPhase()},400);
}

function startSalaryPhase(){
  addBotMsg('Trevligt att träffas, <strong>'+D.name1+'</strong> och <strong>'+D.name2+'</strong>! 😊',400);
  addBotMsg('Nu till det viktiga – vad tjänar ni i bruttolön? 💰',300);
  addBotMsg('Fyll i lön före skatt. Jag räknar ut netto automatiskt.',100);
  showSalaryInput();
}

function showSalaryInput(){
  enqueue(function(){
    inputArea.innerHTML='<div class="ci-group"><div class="ci-dot" style="background:var(--accent1)"></div><input class="ci-input" type="number" id="ciG1" placeholder="'+D.name1+'s bruttolön" oninput="updateSalInput()"><span class="ci-suffix">kr</span></div><div class="ci-net" id="ciNet1">Netto: 0 kr</div><div class="ci-group" style="margin-top:8px"><div class="ci-dot" style="background:var(--accent2)"></div><input class="ci-input" type="number" id="ciG2" placeholder="'+D.name2+'s bruttolön" oninput="updateSalInput()"><span class="ci-suffix">kr</span></div><div class="ci-net" id="ciNet2">Netto: 0 kr</div><div class="ci-row"><div style="flex:1"></div><button class="ci-send" id="ciSendSal" disabled onclick="submitSalary()">→</button></div>';
    inputArea.classList.add('show');
    scrollBottom();
    running=false;
  });
}

function updateSalInput(){
  var g1=parseFloat(document.getElementById('ciG1').value)||0;
  var g2=parseFloat(document.getElementById('ciG2').value)||0;
  D.gross1=g1;D.gross2=g2;D.net1=calcNet(g1);D.net2=calcNet(g2);
  document.getElementById('ciNet1').textContent='Netto: '+fmt(D.net1)+' kr';
  document.getElementById('ciNet2').textContent='Netto: '+fmt(D.net2)+' kr';
  document.getElementById('ciSendSal').disabled=!(g1>0&&g2>0);
  var tot=D.net1+D.net2;
  if(tot>0){D.r1=Math.round(D.net1/tot*100);D.r2=100-D.r1}
}

function submitSalary(){
  inputArea.classList.remove('show');inputArea.innerHTML='';
  addUserMsg(D.name1+': '+fmt(D.gross1)+' kr/mån<br>'+D.name2+': '+fmt(D.gross2)+' kr/mån');
  setTimeout(startRatioPhase,400);
}

function startRatioPhase(){
  addBotMsg('Perfekt! Baserat på era löner blir fördelningen så här:',300);

  // Rich ratio card
  var html='<div class="rc-ratio-badges"><div class="rc-ratio-badge p1" id="rcB1">'+D.r1+'%</div><div class="rc-ratio-badge p2" id="rcB2">'+D.r2+'%</div></div><div class="rc-ratio-bar"><div class="rc-fill1" id="rcF1"></div><div class="rc-fill2" id="rcF2"></div></div><div class="rc-labels"><span>'+D.name1+'</span><span>'+D.name2+'</span></div>';
  addRichCard(html,'wide');

  enqueue(function(){
    setTimeout(function(){
      var b1=document.getElementById('rcB1'),b2=document.getElementById('rcB2');
      if(b1){b1.classList.add('show');setTimeout(function(){b2.classList.add('show')},150)}
      setTimeout(function(){
        var f1=document.getElementById('rcF1'),f2=document.getElementById('rcF2');
        if(f1){f1.style.width=D.r1+'%';f2.style.width=D.r2+'%'}
      },300);
    },200);
    setTimeout(runNext,800);
  });

  addBotMsg(D.name1+' betalar '+D.r1+'% och '+D.name2+' betalar '+D.r2+'% – men ni båda behåller samma andel av er lön. Rättvist! ⚖️',400);
  startHowPhase();
}

function startHowPhase(){
  addBotMsg('Så här använder ni appen:',200);

  var html='<div class="rc-step" id="rs1"><span class="icon">➕</span> Lägg till gemensamma utgifter</div><div class="rc-step" id="rs2"><span class="icon">⚖️</span> Fördelningen beräknas automatiskt</div><div class="rc-step" id="rs3"><span class="icon">📊</span> Se översikten – vem är skyldig vad?</div>';
  addRichCard(html,'wide');

  enqueue(function(){
    setTimeout(function(){
      ['rs1','rs2','rs3'].forEach(function(id,i){
        setTimeout(function(){var el=document.getElementById(id);if(el)el.classList.add('show')},i*250);
      });
    },100);
    setTimeout(runNext,900);
  });

  addBotMsg('Enkelt, eller hur? 😄',300);
  startReadyPhase();
}

function startReadyPhase(){
  addBotMsg('Ni är redo att börja! 🎉',200);

  var html='<div class="rc-sum-row"><span class="l"><span class="dot" style="background:var(--accent1)"></span>'+D.name1+'</span><span class="v">Netto: '+fmt(D.net1)+' kr</span></div><div class="rc-sum-row"><span class="l"><span class="dot" style="background:var(--accent2)"></span>'+D.name2+'</span><span class="v">Netto: '+fmt(D.net2)+' kr</span></div><div class="rc-sum-div"></div><div style="display:flex;justify-content:center;gap:8px;margin-top:8px"><div class="rc-ratio-badge p1 show" style="font-size:13px;padding:4px 10px">'+D.r1+'%</div><div class="rc-ratio-badge p2 show" style="font-size:13px;padding:4px 10px">'+D.r2+'%</div></div>';
  addRichCard(html,'wide');

  enqueue(function(){
    ctaArea.innerHTML='<button class="chat-cta-btn" onclick="finish()">Börja använda FairShare →</button>';
    ctaArea.classList.add('show');
    scrollBottom();
    running=false;
  });
}

function finish(){
  document.body.style.transition='opacity .5s';
  document.body.style.opacity='0';
  setTimeout(function(){
    document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:var(--text);font-family:Inter,sans-serif;font-size:18px;text-align:center;padding:20px;background:var(--bg)"><div><div style="font-size:48px;margin-bottom:16px">✅</div>Tutorial klar!<br><span style="color:var(--text3);font-size:14px">I den riktiga appen visas huvudvyn här.</span></div></div>';
    document.body.style.opacity='1';
  },500);
}

// Start the conversation
addBotMsg('Hej! 👋 Välkommen till <strong>FairShare</strong>!',400);
addBotMsg('Jag hjälper er dela hushållskostnader rättvist – baserat på inkomst, inte 50/50.',400);
addBotMsg('Ska vi sätta igång? Det tar bara 2 minuter! 🚀',100);
addActions([
  {label:'Ja, kör!',primary:true,action:function(){
    addUserMsg('Ja, kör!');
    setTimeout(function(){
      addBotMsg('Toppen! Först – vilka bor ihop? 🏠',200);
      showNameInput();
    },300);
  }},
  {label:'Hoppa över',primary:false,action:finish}
]);
</script>
</body>
</html>
